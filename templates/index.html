<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PixelTown</title>

<!-- PWA / APK gereksinimleri -->
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0d0d14">
<link rel="icon" href="/static/icons/icon-192.png">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PixelTown">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { background: #0d0d14; color: #eee; font-family: monospace; }

  /* EKRANLAR */
  .screen { display: none; flex-direction: column; height: 100%; min-height: 0; }
  .screen.active { display: flex; }

  /* GİRİŞ EKRANI */
  #loginScreen {
    align-items: center; justify-content: center; gap: 20px;
    background: linear-gradient(135deg, #0d0d14 0%, #1a1a2e 100%);
  }
  .logo { font-size: 2.5rem; color: #64d9ff; text-shadow: 0 0 20px #64d9ff44; }
  .logo span { color: #ffd700; }
  input[type=text] {
    background: #1e1e2e; border: 2px solid #333; color: #eee;
    padding: 12px 16px; border-radius: 8px; font-size: 1rem;
    width: 80vw; max-width: 300px; outline: none;
  }
  input[type=text]:focus { border-color: #64d9ff; }
  input[type=email], input[type=password] {
    background: #1e1e2e; border: 2px solid #333; color: #eee;
    padding: 12px 16px; border-radius: 8px; font-size: 1rem;
    width: 80vw; max-width: 300px; outline: none; font-family: monospace;
  }
  input[type=email]:focus, input[type=password]:focus { border-color: #64d9ff; }
  .btn {
    padding: 12px 24px; border: none; border-radius: 8px;
    font-size: 1rem; cursor: pointer; font-family: monospace;
    width: 80vw; max-width: 300px;
  }
  .btn-primary { background: #2196F3; color: #fff; }
  .btn-green { background: #4CAF50; color: #fff; }
  .btn-red { background: #E53935; color: #fff; }

  /* HESAP / GİRİŞ-KAYIT */
  #loginScreen { overflow-y: auto; padding: 20px 0; }
  .auth-tabs { display: flex; width: 80vw; max-width: 300px; gap: 4px; }
  .auth-tab {
    flex: 1; padding: 10px; background: #1e1e2e; border: none; color: #888;
    border-radius: 8px 8px 0 0; cursor: pointer; font-family: monospace; font-size: 0.9rem;
  }
  .auth-tab.active { background: #2a2a3e; color: #64d9ff; }
  .auth-form { display: flex; flex-direction: column; gap: 10px; align-items: center; width: 100%; }
  .auth-link {
    color: #64d9ff; font-size: 0.8rem; text-align: center; cursor: pointer;
    text-decoration: underline;
  }
  .auth-error { color: #FF5252; font-size: 0.8rem; text-align: center; min-height: 1em; }
  .auth-divider {
    color: #555; font-size: 0.8rem; display: flex; align-items: center;
    width: 80vw; max-width: 300px; gap: 8px;
  }
  .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: #333; }

  /* GENEL POPUP */
  .popup-overlay {
    display: none; position: fixed; inset: 0;
    background: #000a; z-index: 100;
    align-items: center; justify-content: center;
  }
  .popup-overlay.show { display: flex; }

  /* PROFİL EKRANI */
  #profileScreen { padding: 12px; gap: 12px; overflow-y: auto; }
  .profile-content { display: flex; flex-direction: column; gap: 10px; padding-bottom: 24px; }
  .profile-avatar {
    width: 72px; height: 72px; border-radius: 50%; align-self: center;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; font-weight: bold; color: #fff; background: #333;
    overflow: hidden;
  }
  .profile-content label { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
  .profile-content input, .profile-content select {
    background: #1e1e2e; border: 2px solid #333; color: #eee;
    padding: 10px 12px; border-radius: 8px; font-size: 0.95rem;
    font-family: monospace; outline: none; width: 100%;
  }
  .profile-content input:disabled { color: #777; }
  .toggle-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #ddd; }
  .toggle-row input { width: auto; }
  .profile-content h3 { color: #64d9ff; font-size: 0.9rem; margin-top: 8px; }

  /* LOBİ EKRANI */
  #lobbyScreen { padding: 12px; gap: 10px; }
  .lobby-header { display: flex; align-items: center; gap: 10px; }
  .lobby-header h2 { color: #64d9ff; flex: 1; font-size: 1.1rem; }
  .room-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .room-card {
    background: #1e1e2e; border: 1px solid #333; border-radius: 8px;
    padding: 12px; cursor: pointer; display: flex; justify-content: space-between;
    align-items: center;
  }
  .room-card:active { background: #2a2a3e; }
  .room-name { font-size: 0.95rem; color: #eee; }
  .room-count { font-size: 0.8rem; color: #888; }
  .empty-msg { color: #555; text-align: center; padding: 40px 0; }

  /* OYUN EKRANI */
  #gameScreen { position: relative; min-height: 0; }
  #topBar {
    background: #1e1e2e; padding: 6px 10px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
  }
  #topBar .room-title { flex: 1; color: #64d9ff; font-size: 0.9rem; }
  #playerCount { color: #aaa; font-size: 0.85rem; }

  #gameArea { position: relative; display: flex; flex: 1; min-height: 0; overflow: hidden; }
  #gameCanvas { display: block; flex: 1; min-width: 0; }

  #blockPanel {
    width: 60px; background: #1e1e2e;
    display: flex; flex-direction: column; padding: 4px; gap: 3px;
    overflow-y: auto; border-left: 1px solid #333;
  }
  .block-btn {
    width: 52px; height: 44px; border: 2px solid transparent;
    border-radius: 6px; cursor: pointer; font-size: 0.6rem;
    color: #fff; text-align: center; display: flex;
    align-items: center; justify-content: center;
    flex-direction: column; text-shadow: 0 1px 2px #000;
  }
  .block-btn.selected { border-color: #fff; }
  .erase-btn {
    background: #333; width: 52px; height: 44px;
    border-radius: 6px; cursor: pointer; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid transparent;
  }
  .erase-btn.selected { border-color: #fff; }

  #bottomBar {
    background: #1e1e2e; border-top: 1px solid #333;
    display: flex; flex-wrap: wrap; gap: 6px; padding: 6px;
    align-items: center;
    flex-shrink: 0;
  }
  #dpad {
    display: flex; gap: 3px;
  }
  #dpad .dpad-btn { width: 42px; height: 42px; font-size: 1.1rem; }
  .dpad-btn {
    background: #2a2a3e; border: none; color: #eee;
    border-radius: 6px; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    touch-action: none; user-select: none; -webkit-user-select: none;
  }
  .dpad-btn:active { background: #3a3a5e; }

  /* SAĞ ALT EYLEM BUTONLARI (Zıplama / Etkileşim) */
  #actionPad {
    position: absolute;
    right: 68px; bottom: 12px;
    display: flex; flex-direction: column; gap: 10px;
    z-index: 5;
  }
  .action-btn {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(42,42,62,0.85); border: 2px solid #444;
    color: #eee; font-size: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    touch-action: none; user-select: none; -webkit-user-select: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .action-btn:active { background: rgba(58,58,94,0.95); }
  #jumpBtn { color: #FFD700; }
  #interactBtn { color: #64d9ff; font-size: 1.3rem; }

  #chatArea { flex: 1 1 160px; min-width: 160px; display: flex; flex-direction: column; gap: 4px; }
  #chatMessages {
    flex: 1; min-height: 0; overflow-y: auto; font-size: 0.72rem;
    color: #aaa; max-height: 60px; line-height: 1.4;
  }
  #chatRow { display: flex; gap: 4px; }
  #chatInput {
    flex: 1; background: #0d0d14; border: 1px solid #333;
    color: #eee; padding: 6px 8px; border-radius: 6px;
    font-size: 0.8rem; outline: none;
  }
  #sendBtn {
    background: #2196F3; border: none; color: #fff;
    padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.9rem;
  }

  /* POPUP */
  #popup {
    display: none; position: fixed; inset: 0;
    background: #000a; z-index: 100;
    align-items: center; justify-content: center;
  }
  #popup.show { display: flex; }
  .popup-box {
    background: #1e1e2e; border-radius: 12px;
    padding: 24px; width: 85vw; max-width: 320px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .popup-box h3 { color: #64d9ff; }
  .popup-btns { display: flex; gap: 8px; }
  .popup-btns .btn { width: auto; flex: 1; padding: 10px; }
</style>
</head>
<body>

<!-- GİRİŞ / KAYIT EKRANI -->
<div id="loginScreen" class="screen active">
  <div class="logo">🏙️ Pixel<span>Town</span></div>
  <p id="authStatus" style="font-size:0.8rem;color:#666;min-height:1em"></p>

  <div class="auth-tabs">
    <button class="auth-tab active" id="loginTabBtn" onclick="switchAuthTab('login')">Giriş Yap</button>
    <button class="auth-tab" id="registerTabBtn" onclick="switchAuthTab('register')">Kayıt Ol</button>
  </div>

  <div id="loginForm" class="auth-form">
    <input type="email" id="loginEmail" placeholder="E-posta" autocomplete="email">
    <input type="password" id="loginPassword" placeholder="Şifre" autocomplete="current-password">
    <button class="btn btn-primary" onclick="doLogin()">Giriş Yap →</button>
    <p class="auth-link" onclick="showForgotPopup()">Şifremi unuttum</p>
    <p id="loginError" class="auth-error"></p>
  </div>

  <div id="registerForm" class="auth-form" style="display:none">
    <input type="text" id="regOriginalName" placeholder="Adın Soyadın (orijinal ad)" maxlength="100">
    <input type="text" id="regUsername" placeholder="Takma ad (oyunda görünür)" maxlength="20">
    <input type="email" id="regEmail" placeholder="E-posta" autocomplete="email">
    <input type="password" id="regPassword" placeholder="Şifre (en az 6 karakter)" autocomplete="new-password">
    <button class="btn btn-primary" onclick="doRegister()">Hesap Oluştur →</button>
    <p id="registerError" class="auth-error"></p>
  </div>

  <div class="auth-divider">veya</div>
  <input type="text" id="nameInput" placeholder="Misafir adı..." maxlength="16">
  <button class="btn btn-green" onclick="enterAsGuest()">Misafir Olarak Gir →</button>
</div>

<!-- ŞİFRE SIFIRLAMA EKRANI (e-postadaki linkten gelinir) -->
<div id="resetPasswordScreen" class="screen">
  <div class="logo">🏙️ Pixel<span>Town</span></div>
  <div class="auth-form">
    <p style="font-size:0.85rem;color:#aaa;text-align:center;width:80vw;max-width:300px">
      Yeni şifreni belirle:
    </p>
    <input type="hidden" id="resetTokenInput">
    <input type="password" id="resetPassword1" placeholder="Yeni şifre">
    <input type="password" id="resetPassword2" placeholder="Yeni şifre (tekrar)">
    <button class="btn btn-primary" onclick="doResetPassword()">Şifreyi Güncelle</button>
    <p id="resetError" class="auth-error"></p>
  </div>
</div>

<!-- PROFİL EKRANI -->
<div id="profileScreen" class="screen">
  <div class="lobby-header">
    <button class="btn btn-red" style="width:auto;padding:8px 12px" onclick="showScreen('lobbyScreen')">←</button>
    <h2>👤 Profilim</h2>
  </div>
  <div class="profile-content">
    <div id="profileAvatar" class="profile-avatar"></div>
    <p style="font-size:0.78rem;color:#888;text-align:center">
      Karakter sistemi tamamlandığında profil resmin, karakterinin kafasından otomatik oluşturulacak.
    </p>

    <label>Takma Ad (oyunda görünür)</label>
    <input type="text" id="profileUsername" maxlength="20">

    <label>Orijinal Ad</label>
    <input type="text" id="profileOriginalName" disabled>

    <label>E-posta</label>
    <input type="text" id="profileEmail" disabled>

    <h3>Gizlilik</h3>
    <label class="toggle-row"><input type="checkbox" id="privShowRealName"> Orijinal adımı diğer oyunculara göster</label>
    <label class="toggle-row"><input type="checkbox" id="privShowOnline"> Çevrimiçi durumumu göster</label>
    <label>Kimler bana mesaj gönderebilir?</label>
    <select id="privAllowMessages">
      <option value="everyone">Herkes</option>
      <option value="friends">Sadece Arkadaşlar</option>
      <option value="none">Hiç kimse</option>
    </select>

    <button class="btn btn-primary" onclick="saveProfile()">Kaydet</button>
    <p id="profileMsg" class="auth-error"></p>
    <button class="btn btn-red" onclick="doLogout()">Çıkış Yap</button>
  </div>
</div>

<!-- LOBİ EKRANI -->
<div id="lobbyScreen" class="screen">
  <div class="lobby-header">
    <button class="btn btn-primary" style="width:auto;padding:8px 12px" onclick="openProfile()">👤</button>
    <h2>🏙️ PixelTown Lobisi</h2>
    <button class="btn btn-primary" style="width:auto;padding:8px 12px" onclick="loadRooms()">🔄</button>
  </div>
  <div id="roomList" class="room-list">
    <p class="empty-msg">Yükleniyor...</p>
  </div>
  <button class="btn btn-green" onclick="showHostPopup()">+ Yeni Oda Aç</button>
  <p id="lobbyStatus" style="font-size:0.8rem;color:#666;text-align:center"></p>
</div>

<!-- OYUN EKRANI -->
<div id="gameScreen" class="screen">
  <div id="topBar">
    <button onclick="leaveGame()" style="background:#333;border:none;color:#eee;padding:6px 10px;border-radius:6px;cursor:pointer">←</button>
    <span class="room-title" id="roomTitle">Oda</span>
    <span id="hostBadge" style="display:none;font-size:0.75rem;color:#FFD700;margin-right:4px">👑</span>
    <span id="playerCount">👥 0</span>
  </div>
  <div id="gameArea">
    <canvas id="gameCanvas"></canvas>
    <div id="blockPanel" id="blockPanel"></div>
    <div id="actionPad">
      <button class="action-btn dpad-btn" id="jumpBtn" data-key="jump">⤴</button>
      <button class="action-btn" id="interactBtn">✋</button>
    </div>
  </div>
  <div id="bottomBar">
    <div id="dpad">
      <button class="dpad-btn" data-key="left">◄</button>
      <button class="dpad-btn" data-key="up">👁⬆</button>
      <button class="dpad-btn" data-key="down">👁⬇</button>
      <button class="dpad-btn" data-key="right">►</button>
    </div>
    <div id="chatArea">
      <div id="chatMessages"></div>
      <div id="chatRow">
        <input type="text" id="chatInput" placeholder="Mesaj..." maxlength="200"
               onkeydown="if(event.key==='Enter') sendChat()">
        <button id="sendBtn" onclick="sendChat()">→</button>
      </div>
    </div>
  </div>
</div>

<!-- POPUP: Oda Aç -->
<div id="popup">
  <div class="popup-box">
    <h3>Yeni Oda Aç</h3>
    <input type="text" id="roomNameInput" placeholder="Oda adı..." maxlength="30">
    <div class="popup-btns">
      <button class="btn btn-green" onclick="hostRoom()">Aç</button>
      <button class="btn btn-red" onclick="hidePopup()">İptal</button>
    </div>
  </div>
</div>

<!-- POPUP: Şifremi Unuttum -->
<div id="forgotPopup" class="popup-overlay">
  <div class="popup-box">
    <h3>Şifremi Unuttum</h3>
    <input type="email" id="forgotEmail" placeholder="E-posta">
    <div class="popup-btns">
      <button class="btn btn-green" onclick="doForgotPassword()">Gönder</button>
      <button class="btn btn-red" onclick="hideForgotPopup()">İptal</button>
    </div>
    <p id="forgotMsg" style="font-size:0.8rem;color:#aaa;text-align:center"></p>
  </div>
</div>

<script>
// ---------------------------------------------------------
// Durum
// ---------------------------------------------------------
const TILE = 32;
let myId = null, myName = "Oyuncu";
let currentUser = null; // giriş yapılmış hesap (varsa) - { id, email, original_name, username, profile_picture, privacy_settings }
let worldBlocks = {}, gamePlayers = {};
let selectedBlock = "grass";
let camX = 0, camY = 0;
let ws = null;
let blockColors = {{ block_colors|safe }};
let chatMessages = [];
let interactEffects = {}; // {playerId: timestamp} - geçici "✋" göstergesi için

// ---------------------------------------------------------
// Client-Side Fizik (Sunucu ile aynı oranlarda, anlık tepki için)
// Sunucu: 20Hz tick. tile/tick * 20 = tile/sec dönüşümü yapıldı.
// ---------------------------------------------------------
const GRAVITY_ACC   = 0.018 * 400; // 7.2 tile/sec^2
const JUMP_VEL      = 0.38 * 20;   // 7.6 tile/sec
const MOVE_SPEED    = 0.20 * 20;   // 4.0 tile/sec (sunucu ile birebir aynı)
const MAX_FALL      = 0.6 * 20;    // 12 tile/sec
const PLAYER_W = 0.8, PLAYER_H = 0.9;
const EPS = 1e-6;

const SOLID_TYPES = new Set(Object.keys(blockColors).filter(t => t !== 'water'));

function isSolidClient(x, y) {
  const key = `${Math.floor(x)},${Math.floor(y)}`;
  return SOLID_TYPES.has(worldBlocks[key]);
}

function checkCollisionClient(x, y, w, h) {
  const x0 = Math.floor(x + EPS), x1 = Math.floor(x + w - EPS);
  const y0 = Math.floor(y + EPS), y1 = Math.floor(y + h - EPS);
  for (let tx = x0; tx <= x1; tx++) {
    for (let ty = y0; ty <= y1; ty++) {
      if (tx < x + w - EPS && tx + 1 > x + EPS &&
          ty < y + h - EPS && ty + 1 > y + EPS) {
        if (isSolidClient(tx, ty)) return true;
      }
    }
  }
  return false;
}

// Yerel oyuncu fizik adımı (dt = saniye)
function clientPhysicsStep(dt) {
  const me = gamePlayers[myId];
  if (!me) return;

  let vx = 0;
  if (inputState.left) vx -= MOVE_SPEED;
  if (inputState.right) vx += MOVE_SPEED;

  let vy = (me.vy || 0) - GRAVITY_ACC * dt;
  if (vy < -MAX_FALL) vy = -MAX_FALL;

  if (inputState.jump && me.on_ground) {
    vy = JUMP_VEL;
    me.on_ground = false;
  }

  let x = me.x, y = me.y;

  // Yatay
  if (vx !== 0) {
    const newX = x + vx * dt;
    if (!checkCollisionClient(newX, y, PLAYER_W, PLAYER_H)) x = newX;
  }

  // Dikey
  let onGround = false;
  if (vy !== 0) {
    const newY = y + vy * dt;
    if (checkCollisionClient(x, newY, PLAYER_W, PLAYER_H)) {
      vy = 0;
      if (newY < y) onGround = true; // aşağı çarptı = yerde
    } else {
      y = newY;
    }
  } else {
    if (checkCollisionClient(x, y - 0.05, PLAYER_W, PLAYER_H)) onGround = true;
  }

  me.x = x; me.y = y; me.vy = vy; me.on_ground = onGround;
  if (vx > 0) me.facing = 'right';
  else if (vx < 0) me.facing = 'left';

  // Bakış yönü (yukarı bak / eğil) - anlık yerel geri bildirim için
  if (inputState.up) me.look = 'up';
  else if (inputState.down) me.look = 'down';
  else me.look = 'normal';
}

// ---------------------------------------------------------
// Ekran Yönetimi
// ---------------------------------------------------------
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'gameScreen') initCanvas();
}

// ---------------------------------------------------------
// Hesap Sistemi
// ---------------------------------------------------------

async function checkSession() {
  // Şifre sıfırlama linkinden geliniyorsa doğrudan o ekranı göster
  const params = new URLSearchParams(location.search);
  const resetToken = params.get('reset_token');
  if (resetToken) {
    document.getElementById('resetTokenInput').value = resetToken;
    showScreen('resetPasswordScreen');
    return;
  }

  const statusEl = document.getElementById('authStatus');
  statusEl.textContent = 'Sunucuya bağlanılıyor...';

  try {
    const r = await fetch('/api/me');
    const data = await r.json();
    statusEl.textContent = '';
    if (data.user) {
      currentUser = data.user;
      myName = currentUser.username;
      showScreen('lobbyScreen');
      loadRooms();
      return;
    }
  } catch (e) {
    statusEl.textContent = 'Sunucu uyandırılıyor, lütfen bekleyin...';
    setTimeout(checkSession, 2500);
    return;
  }

  showScreen('loginScreen');
}

function switchAuthTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('loginForm').style.display = isLogin ? 'flex' : 'none';
  document.getElementById('registerForm').style.display = isLogin ? 'none' : 'flex';
  document.getElementById('loginTabBtn').classList.toggle('active', isLogin);
  document.getElementById('registerTabBtn').classList.toggle('active', !isLogin);
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.error || 'Giriş başarısız.'; return; }
    currentUser = data.user;
    myName = currentUser.username;
    showScreen('lobbyScreen');
    loadRooms();
  } catch (e) {
    errEl.textContent = 'Bağlantı hatası.';
  }
}

async function doRegister() {
  const original_name = document.getElementById('regOriginalName').value.trim();
  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const errEl = document.getElementById('registerError');
  errEl.textContent = '';
  try {
    const r = await fetch('/api/register', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({original_name, username, email, password})
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.error || 'Kayıt başarısız.'; return; }
    currentUser = data.user;
    myName = currentUser.username;
    showScreen('lobbyScreen');
    loadRooms();
  } catch (e) {
    errEl.textContent = 'Bağlantı hatası.';
  }
}

function enterAsGuest() {
  const n = document.getElementById('nameInput').value.trim();
  myName = n || "Misafir";
  currentUser = null;
  showScreen('lobbyScreen');
  loadRooms();
}

async function doLogout() {
  try { await fetch('/api/logout', {method: 'POST'}); } catch (e) {}
  currentUser = null;
  myName = "Oyuncu";
  showScreen('loginScreen');
}

function showForgotPopup() {
  document.getElementById('forgotEmail').value = '';
  const msgEl = document.getElementById('forgotMsg');
  msgEl.textContent = '';
  msgEl.style.color = '#aaa';
  document.getElementById('forgotPopup').classList.add('show');
}

function hideForgotPopup() {
  document.getElementById('forgotPopup').classList.remove('show');
}

async function doForgotPassword() {
  const email = document.getElementById('forgotEmail').value.trim();
  const msgEl = document.getElementById('forgotMsg');
  try {
    const r = await fetch('/api/forgot-password', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email})
    });
    const data = await r.json();
    msgEl.style.color = '#4CAF50';
    msgEl.textContent = data.message || 'Bağlantı gönderildi.';
  } catch (e) {
    msgEl.style.color = '#FF5252';
    msgEl.textContent = 'Bağlantı hatası.';
  }
}

async function doResetPassword() {
  const token = document.getElementById('resetTokenInput').value;
  const pw1 = document.getElementById('resetPassword1').value;
  const pw2 = document.getElementById('resetPassword2').value;
  const errEl = document.getElementById('resetError');
  errEl.style.color = '#FF5252';
  errEl.textContent = '';

  if (pw1.length < 6) { errEl.textContent = 'Şifre en az 6 karakter olmalı.'; return; }
  if (pw1 !== pw2) { errEl.textContent = 'Şifreler eşleşmiyor.'; return; }

  try {
    const r = await fetch('/api/reset-password', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token, new_password: pw1})
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.error || 'Bir hata oluştu.'; return; }
    history.replaceState({}, '', location.pathname);
    errEl.style.color = '#4CAF50';
    errEl.textContent = 'Şifren güncellendi! Giriş ekranına yönlendiriliyorsun...';
    setTimeout(() => showScreen('loginScreen'), 1500);
  } catch (e) {
    errEl.textContent = 'Bağlantı hatası.';
  }
}

// ---------------------------------------------------------
// Profil
// ---------------------------------------------------------

function renderAvatar(el, user) {
  if (user && user.profile_picture) {
    el.style.background = 'transparent';
    el.innerHTML = `<img src="${user.profile_picture}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    return;
  }
  const name = (user && user.username) ? user.username : '?';
  const letter = name.charAt(0).toUpperCase();
  const colors = ['#FF5252', '#4CAF50', '#2196F3', '#FFD700', '#9C27B0', '#FF9800', '#64d9ff'];
  const color = colors[name.charCodeAt(0) % colors.length];
  el.style.background = color;
  el.innerHTML = letter;
}

function openProfile() {
  if (!currentUser) {
    // Misafir: hesap yok, giriş/kayıt ekranına yönlendir
    showScreen('loginScreen');
    return;
  }
  document.getElementById('profileUsername').value = currentUser.username;
  document.getElementById('profileOriginalName').value = currentUser.original_name;
  document.getElementById('profileEmail').value = currentUser.email;
  document.getElementById('privShowRealName').checked = !!currentUser.privacy_settings.show_real_name;
  document.getElementById('privShowOnline').checked = !!currentUser.privacy_settings.show_online_status;
  document.getElementById('privAllowMessages').value = currentUser.privacy_settings.allow_messages;
  renderAvatar(document.getElementById('profileAvatar'), currentUser);
  document.getElementById('profileMsg').textContent = '';
  showScreen('profileScreen');
}

async function saveProfile() {
  const username = document.getElementById('profileUsername').value.trim();
  const privacy_settings = {
    show_real_name: document.getElementById('privShowRealName').checked,
    show_online_status: document.getElementById('privShowOnline').checked,
    allow_messages: document.getElementById('privAllowMessages').value,
  };
  const msgEl = document.getElementById('profileMsg');
  msgEl.textContent = '';
  try {
    const r = await fetch('/api/update-profile', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, privacy_settings})
    });
    const data = await r.json();
    if (!r.ok) {
      msgEl.style.color = '#FF5252';
      msgEl.textContent = data.error || 'Bir hata oluştu.';
      return;
    }
    currentUser = data.user;
    myName = currentUser.username;
    renderAvatar(document.getElementById('profileAvatar'), currentUser);
    msgEl.style.color = '#4CAF50';
    msgEl.textContent = 'Kaydedildi!';
  } catch (e) {
    msgEl.style.color = '#FF5252';
    msgEl.textContent = 'Bağlantı hatası.';
  }
}

// ---------------------------------------------------------
// Lobi
// ---------------------------------------------------------
async function loadRooms(retryCount = 0) {
  const MAX_RETRIES = 8;
  if (retryCount === 0) {
    document.getElementById('lobbyStatus').textContent = 'Odalar yükleniyor...';
  } else {
    document.getElementById('lobbyStatus').textContent =
      `Sunucu uyandırılıyor... (${retryCount}/${MAX_RETRIES})`;
  }
  try {
    const r = await fetch('/api/rooms');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const rooms = await r.json();
    renderRooms(rooms);
    document.getElementById('lobbyStatus').textContent = `${rooms.length} oda bulundu`;
  } catch(e) {
    if (retryCount < MAX_RETRIES) {
      setTimeout(() => loadRooms(retryCount + 1), 4000);
    } else {
      document.getElementById('lobbyStatus').textContent =
        'Bağlantı hatası — 🔄 ile tekrar deneyin';
    }
  }
}

function renderRooms(rooms) {
  const el = document.getElementById('roomList');
  if (!rooms.length) {
    el.innerHTML = '<p class="empty-msg">Henüz oda yok. İlk odayı sen aç!</p>';
    return;
  }
  el.innerHTML = rooms.map(r => {
    const safeName = r.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    return `
    <div class="room-card" onclick="joinRoom('${r.room_id}', '${safeName}')">
      <div>
        <div class="room-name">🏠 ${r.name}</div>
      </div>
      <div class="room-count">${r.current_players}/${r.max_players}</div>
    </div>
  `;
  }).join('');
}

function showHostPopup() {
  document.getElementById('roomNameInput').value = myName + "'nin Odası";
  document.getElementById('popup').classList.add('show');
}

function hidePopup() {
  document.getElementById('popup').classList.remove('show');
}

async function hostRoom() {
  const name = document.getElementById('roomNameInput').value.trim() || myName + "'nin Odası";
  hidePopup();
  document.getElementById('lobbyStatus').textContent = 'Oda açılıyor...';
  const r = await fetch('/api/host', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name})
  });
  const data = await r.json();
  joinRoom(data.room_id, data.room_name);
}

// ---------------------------------------------------------
// Oyuna Bağlan
// ---------------------------------------------------------
let isOwner = false;
let myPlayerId = null;
let currentRoomId = null;

function joinRoom(roomId, name) {
  currentRoomId = roomId;
  document.getElementById('roomTitle').textContent = name;
  showScreen('gameScreen');

  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${location.host}/ws/${roomId}`;

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    ws.send(JSON.stringify({type: 'join', name: myName}));
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleMessage(data);
  };

  ws.onclose = () => {
    addChat('Sistem', 'Bağlantı kesildi.');
  };

  startRenderLoop();
}

function leaveGame() {
  if (ws) ws.close();
  stopRenderLoop();
  worldBlocks = {}; gamePlayers = {};
  myId = null;
  showScreen('lobbyScreen');
}

// ---------------------------------------------------------
// Render Döngüsü (60fps, yerel fizik + çizim)
// ---------------------------------------------------------
let rafId = null;
let lastFrameTime = null;

function startRenderLoop() {
  if (rafId) return;
  lastFrameTime = performance.now();
  rafId = requestAnimationFrame(renderFrame);
}

function stopRenderLoop() {
  if (rafId) {
    cancelAnimationFrame(rafId);
    rafId = null;
  }
}

function renderFrame(now) {
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  if (dt > 0.05) dt = 0.05; // sekme değişimi gibi büyük sıçramaları sınırla

  if (myId && gamePlayers[myId]) {
    clientPhysicsStep(dt);
    updateCamera();
  }
  drawWorld();

  rafId = requestAnimationFrame(renderFrame);
}

// ---------------------------------------------------------
// Mesaj İşleyici
// ---------------------------------------------------------
function handleMessage(data) {
  switch(data.type) {
    case 'welcome':
      myId = data.your_id;
      myPlayerId = data.your_id;
      isOwner = data.is_owner;
      worldBlocks = data.world || {};
      gamePlayers = {};
      (data.players || []).forEach(p => gamePlayers[p.id] = p);
      updateHostBadge();
      updateCamera();
      drawWorld();
      break;
    case 'host_changed':
      isOwner = (data.new_owner_id === myPlayerId);
      updateHostBadge();
      if (isOwner) addChat('Sistem', '👑 Artık host sizsiniz!');
      break;
    case 'player_joined':
      gamePlayers[data.id] = data;
      updatePlayerCount();
      drawWorld();
      break;
    case 'player_left':
      delete gamePlayers[data.id];
      updatePlayerCount();
      drawWorld();
      addChat('Sistem', `${data.name} ayrıldı`);
      break;
    case 'physics_update':
      for (const [pid, pdata] of Object.entries(data.players)) {
        if (!gamePlayers[pid]) continue;
        if (pid === myId) {
          // Kendi oyuncumuz: yumuşak düzeltme (drift correction)
          const me = gamePlayers[pid];
          const dx = pdata.x - me.x, dy = pdata.y - me.y;
          const dist = Math.hypot(dx, dy);
          if (dist > 2.5) {
            Object.assign(me, pdata);  // büyük fark - anında düzelt
          } else if (dist > 0.05) {
            me.x += dx * 0.08;
            me.y += dy * 0.08;
            me.on_ground = pdata.on_ground;
          }
        } else {
          Object.assign(gamePlayers[pid], pdata);
        }
      }
      break;
    case 'block_placed':
      worldBlocks[`${data.x},${data.y}`] = data.block_type;
      drawWorld();
      break;
    case 'block_removed':
      delete worldBlocks[`${data.x},${data.y}`];
      drawWorld();
      break;
    case 'chat_message':
      addChat(data.from_name, data.message);
      break;
    case 'player_interact':
      interactEffects[data.id] = performance.now();
      break;
  }
  updatePlayerCount();
}

// ---------------------------------------------------------
// Canvas Çizim
// ---------------------------------------------------------
let canvas, ctx;

function initCanvas() {
  canvas = document.getElementById('gameCanvas');
  const area = document.getElementById('gameArea');
  canvas.width = area.clientWidth - 60;
  canvas.height = area.clientHeight;
  ctx = canvas.getContext('2d');

  // Blok paneli oluştur
  buildBlockPanel();

  // Dokunma ile blok yerleştir
  canvas.addEventListener('click', onCanvasTap);
  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    onCanvasTap({clientX: t.clientX, clientY: t.clientY, rect});
  });

  drawWorld();
}

function drawWorld() {
  if (!ctx) return;
  ctx.fillStyle = '#0d0d14';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < canvas.width; x += TILE) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += TILE) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Bloklar
  for (const [key, type] of Object.entries(worldBlocks)) {
    const [bx, by] = key.split(',').map(Number);
    const sx = (bx - camX) * TILE;
    const sy = canvas.height - (by - camY + 1) * TILE;
    if (sx < -TILE || sx > canvas.width || sy < -TILE || sy > canvas.height) continue;
    ctx.fillStyle = blockColors[type] || '#888';
    ctx.fillRect(sx + 1, sy + 1, TILE - 2, TILE - 2);
    // Blok kenarı
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx + 1, sy + 1, TILE - 2, TILE - 2);
  }

  // Oyuncular
  const PW = 0.8, PH = 0.9; // PLAYER_W, PLAYER_H ile aynı
  const now = performance.now();
  for (const [pid, p] of Object.entries(gamePlayers)) {
    const sx = (p.x - camX) * TILE;
    const sy = canvas.height - (p.y + PH - camY) * TILE;
    const w = PW * TILE, h = PH * TILE;

    ctx.fillStyle = pid === myId ? '#FFD700' : '#FF5252';
    ctx.fillRect(sx, sy, w, h);

    // Yön göstergesi (küçük üçgen)
    ctx.fillStyle = '#000';
    if (p.facing === 'right') {
      ctx.fillRect(sx + w - 6, sy + h/2 - 2, 4, 4);
    } else {
      ctx.fillRect(sx + 2, sy + h/2 - 2, 4, 4);
    }

    // Göz (bakış yönü testi: yukarı bak / eğil -> göz bebeği yukarı/aşağı kayar)
    const eyeSize = 7;
    const eyeX = p.facing === 'right' ? sx + w - eyeSize - 3 : sx + 3;
    const eyeY = sy + 5;
    ctx.fillStyle = '#fff';
    ctx.fillRect(eyeX, eyeY, eyeSize, eyeSize);
    let pupilOffset = eyeSize / 2 - 1; // normal: ortada
    if (p.look === 'up') pupilOffset = 1;
    else if (p.look === 'down') pupilOffset = eyeSize - 2;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(eyeX + eyeSize/2 - 1, eyeY + pupilOffset, 2, 2);

    // Etkileşim göstergesi (kısa süreli "✋")
    if (interactEffects[p.id] && now - interactEffects[p.id] < 600) {
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('✋', sx + w/2, sy - 14);
    }

    // İsim
    ctx.fillStyle = '#fff';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.name, sx + w/2, sy - 2);
  }
}

function onCanvasTap(e) {
  const rect = canvas.getBoundingClientRect();
  const tx = Math.floor((e.clientX - rect.left) / TILE + camX);
  const ty = Math.floor((canvas.height - (e.clientY - rect.top)) / TILE + camY);

  if (selectedBlock === 'erase') {
    delete worldBlocks[`${tx},${ty}`];
    ws.send(JSON.stringify({type: 'remove_block', x: tx, y: ty}));
  } else {
    worldBlocks[`${tx},${ty}`] = selectedBlock;
    ws.send(JSON.stringify({type: 'place_block', x: tx, y: ty, block_type: selectedBlock}));
  }
  drawWorld();
}

// ---------------------------------------------------------
// Blok Paneli
// ---------------------------------------------------------
function buildBlockPanel() {
  const panel = document.getElementById('blockPanel');
  panel.innerHTML = '';
  for (const [type, color] of Object.entries(blockColors)) {
    const btn = document.createElement('div');
    btn.className = 'block-btn' + (type === selectedBlock ? ' selected' : '');
    btn.style.background = color;
    btn.textContent = type.slice(0,4);
    btn.onclick = () => selectBlock(type);
    panel.appendChild(btn);
  }
  const erase = document.createElement('div');
  erase.className = 'erase-btn';
  erase.textContent = '🗑';
  erase.onclick = () => selectBlock('erase');
  panel.appendChild(erase);
}

function selectBlock(type) {
  selectedBlock = type;
  buildBlockPanel();
}

// ---------------------------------------------------------
// Hareket — Platform Kontrolleri
// ---------------------------------------------------------
let inputState = {left: false, right: false, jump: false, up: false, down: false};

function setInput(key, value) {
  if (inputState[key] === value) return;
  inputState[key] = value;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type: 'input', ...inputState}));
  }
}

// D-pad: pointer + touch + mouse birlikte bağlanır (cihaz uyumluluğu için).
// setInput zaten aynı değeri yoksaydığı için çift tetikleme zararsızdır.
function releaseAllInputs() {
  setInput('left', false);
  setInput('right', false);
  setInput('jump', false);
  setInput('up', false);
  setInput('down', false);
}

document.querySelectorAll('.dpad-btn').forEach(btn => {
  const key = btn.dataset.key;
  const press = (e) => { e.preventDefault(); setInput(key, true); };
  const release = (e) => { e.preventDefault(); setInput(key, false); };

  // Pointer events
  btn.addEventListener('pointerdown', (e) => {
    try { btn.setPointerCapture(e.pointerId); } catch(err) {}
    press(e);
  });
  btn.addEventListener('pointerup', release);
  btn.addEventListener('pointercancel', release);
  btn.addEventListener('pointerleave', release);
  btn.addEventListener('pointerout', release);
  btn.addEventListener('lostpointercapture', release);

  // Touch events (yedek - eski WebView'lerde daha güvenilir)
  btn.addEventListener('touchstart', press, {passive: false});
  btn.addEventListener('touchend', release, {passive: false});
  btn.addEventListener('touchcancel', release, {passive: false});

  // Mouse events (masaüstü test için)
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);

  btn.addEventListener('contextmenu', (e) => e.preventDefault());
});

// Etkileşim butonu: basılı tutma değil, tek seferlik "tap" sinyali gönderir
const interactBtn = document.getElementById('interactBtn');
if (interactBtn) {
  const triggerInteract = (e) => {
    e.preventDefault();
    sendInteract();
  };
  interactBtn.addEventListener('pointerdown', triggerInteract);
  interactBtn.addEventListener('touchstart', triggerInteract, {passive: false});
  interactBtn.addEventListener('contextmenu', (e) => e.preventDefault());
}

let lastInteractTime = 0;
function sendInteract() {
  const now = performance.now();
  if (now - lastInteractTime < 150) return; // pointer+touch çift tetiklemesini önle
  lastInteractTime = now;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type: 'interact'}));
  }
  // Kendi karakterimiz için de anında görsel geri bildirim (gecikme olmadan)
  if (myId) interactEffects[myId] = now;
}

// GÜVENLİK AĞI: ekranda hiç dokunuş kalmadıysa tüm hareket tuşlarını
// zorla bırak (herhangi bir buton kendi release olayını kaçırırsa bile)
document.addEventListener('touchend', (e) => {
  if (e.touches.length === 0) releaseAllInputs();
}, {passive: true});
document.addEventListener('touchcancel', (e) => {
  if (e.touches.length === 0) releaseAllInputs();
}, {passive: true});
window.addEventListener('blur', releaseAllInputs);

// Sayfa arka plana alınırsa tüm tuşları bırak (takılı kalmasın)
document.addEventListener('visibilitychange', () => {
  if (document.hidden) releaseAllInputs();
});

// Klavye - basılı tutma desteği
const keysDown = {};
document.addEventListener('keydown', (e) => {
  if (keysDown[e.key]) return;
  keysDown[e.key] = true;
  if (['ArrowLeft','a','A'].includes(e.key)) setInput('left', true);
  if (['ArrowRight','d','D'].includes(e.key)) setInput('right', true);
  if ([' '].includes(e.key)) setInput('jump', true);
  if (['ArrowUp','w','W'].includes(e.key)) setInput('up', true);
  if (['ArrowDown','s','S'].includes(e.key)) setInput('down', true);
  if (['e','E','f','F'].includes(e.key)) sendInteract();
});
document.addEventListener('keyup', (e) => {
  keysDown[e.key] = false;
  if (['ArrowLeft','a','A'].includes(e.key)) setInput('left', false);
  if (['ArrowRight','d','D'].includes(e.key)) setInput('right', false);
  if ([' '].includes(e.key)) setInput('jump', false);
  if (['ArrowUp','w','W'].includes(e.key)) setInput('up', false);
  if (['ArrowDown','s','S'].includes(e.key)) setInput('down', false);
});

function updateCamera() {
  const me = gamePlayers[myId];
  if (!me || !canvas) return;
  const cols = canvas.width / TILE;
  const rows = canvas.height / TILE;
  // Karakteri ekranın yatayda ortasına, dikeyde biraz altına hedefle
  camX = me.x - cols / 2;
  camY = me.y - rows / 2.5;
}

// ---------------------------------------------------------
// Sohbet
// ---------------------------------------------------------
function addChat(name, msg) {
  chatMessages.push(`[${name}]: ${msg}`);
  if (chatMessages.length > 30) chatMessages.shift();
  const el = document.getElementById('chatMessages');
  el.innerHTML = chatMessages.map(m => `<div>${m}</div>`).join('');
  el.scrollTop = el.scrollHeight;
}

function sendChat() {
  const inp = document.getElementById('chatInput');
  const msg = inp.value.trim();
  if (!msg || !ws) return;
  ws.send(JSON.stringify({type: 'chat', message: msg}));
  inp.value = '';
}

function updatePlayerCount() {
  document.getElementById('playerCount').textContent = `👥 ${Object.keys(gamePlayers).length}`;
}

function updateHostBadge() {
  document.getElementById('hostBadge').style.display = isOwner ? 'inline' : 'none';
}

// ---------------------------------------------------------
// Servis Worker Kaydı (PWA/APK gereksinimi) + Başlangıç
// ---------------------------------------------------------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
  });
}

checkSession();
